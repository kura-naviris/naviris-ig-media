name: Auto post to Instagram

# 週5：月〜金 19:00 JST（= 10:00 UTC）。手動実行(dry-run可)も可能。
# 成長重視でReels中心に増量。キューが尽きたら no-op。
on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "コンテナ作成のみ（公開しない）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ig-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish next pending post
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: python3 post_runner.py

      - name: Commit queue changes (mark posted)
        if: ${{ env.DRY_RUN != '1' }}
        env:
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: |
          git config user.name "naviris-bot"
          git config user.email "naviris-bot@users.noreply.github.com"
          if ! git diff --quiet -- queue.json; then
            git add queue.json
            git commit -m "mark posted [skip ci]"
            git push
          else
            echo "queue.json unchanged"
          fi
