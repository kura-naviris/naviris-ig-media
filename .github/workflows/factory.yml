name: Content factory (cloud generation)

# 毎週日 11:00 JST（= 02:00 UTC）に新コンテンツを生成してキュー補充。
# Macは不要（Notoフォント同梱・クラウドで描画）。
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      per_week:
        description: "生成本数（テスト用）"
        type: string
        default: "5"

permissions:
  contents: write

concurrency:
  group: ig-factory
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (ffmpeg + Pillow)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --quiet Pillow
      - name: Generate batch
        env:
          FACTORY_PER_WEEK: ${{ (github.event_name == 'workflow_dispatch' && inputs.per_week) || '5' }}
        run: python3 factory_cloud.py
      - name: Commit new content
        run: |
          git config user.name "naviris-bot"
          git config user.email "naviris-bot@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "factory: weekly cloud batch [skip ci]"
            git push
          else
            echo "nothing generated"
          fi
